<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">

  <!-- ── Icon mark ── -->
  <!-- Orange circle (sun) -->
  <circle cx="56" cy="20" r="12" fill="#F7941D"/>

  <!-- Green arc / wing (earth) — filled crescent curving left-to-right -->
  <path d="
    M 16 62
    C 16 38, 34 20, 56 20
    C 42 26, 30 44, 34 64
    C 28 65, 21 64, 16 62 Z
  " fill="#5BAE47"/>

  <!-- Teal arc / base (water) — wider, lower -->
  <path d="
    M 6 78
    C 6 44, 28 18, 56 18
    C 26 30, 14 58, 20 80
    C 15 80, 9 79, 6 78 Z
  " fill="#006B8F"/>

  <!-- ── Wordmark ── -->
  <text x="80" y="58" font-family="'Arial Black', Arial, sans-serif" font-size="38" font-weight="900" fill="#006B8F" letter-spacing="1.5">MAHATMA</text>

  <!-- ── Tagline ── -->
  <text x="84" y="78" font-family="Arial, sans-serif" font-size="12.5" font-weight="500" fill="#444" letter-spacing="4.5">TRUTH TRIUMPHS</text>

</svg>
