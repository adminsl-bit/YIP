<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 110">

  <!-- ── Icon mark — concentric arc swooshes ── -->

  <!-- Orange circle (top) -->
  <circle cx="52" cy="18" r="11" fill="#F7941D"/>

  <!-- Green swoosh arc — medium radius, from upper-right sweeping to lower-left -->
  <path d="M 62,26 A 38,38 0 0 0 16,60" stroke="#5BAE47" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Teal swoosh arc — larger radius, same sweep direction -->
  <path d="M 66,34 A 52,52 0 0 0 8,78" stroke="#006B8F" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- ── Wordmark ── -->
  <text x="90" y="58"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="36" font-weight="900" fill="#1A5276" letter-spacing="1">MAHATMA</text>

  <!-- ── Tagline ── -->
  <text x="93" y="80"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12" font-weight="500" fill="#555" letter-spacing="4.5">TRUTH TRIUMPHS</text>

</svg>
